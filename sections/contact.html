<!-- CTA / CONTACT -->
<section class="cta" id="contact">
  <div class="container">
    <div class="cta-content reveal">
      <div class="section-tag" style="color:var(--primary-light);">Get Started</div>
      <h2>Schedule a Site Visit</h2>
      <p>Let our experts visit your space and provide a free consultation and estimate for your dream garden.</p>
      <form class="contact-form" id="contactForm" onsubmit="handleSubmit(event)">
        <div class="form-row">
          <input type="text" placeholder="Your Name" required id="contact-name">
          <input type="tel" placeholder="Phone Number" required id="contact-phone">
        </div>
        <input type="email" placeholder="Email Address" required id="contact-email">
        <input type="text" placeholder="City / Location" id="contact-city">
        <textarea placeholder="Tell us about your project..." rows="4" id="contact-message"></textarea>
        <button type="submit" class="btn btn-primary" style="justify-content:center;width:100%;">
          <i class="fas fa-paper-plane"></i> Submit Request
        </button>
      </form>
      <p style="font-size:13px;margin-top:16px;opacity:0.6;">We will get in touch within 24 hours!</p>
    </div>
  </div>
</section>
